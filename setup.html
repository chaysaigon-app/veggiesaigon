<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Kích Hoạt Hệ Thống</title></head>
<body style="font-family:sans-serif; text-align:center; padding-top:50px; background:#f0f2f5;">
    <div style="background:white; padding:30px; display:inline-block; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
        <h2>🚀 Khởi Tạo Hệ Thống Tự Động</h2>
        <p>Bấm nút để thiết lập cấu trúc bảng dữ liệu Firebase.</p>
        <button id="btn" style="padding:15px 30px; background:#e67e22; color:white; border:none; border-radius:25px; font-weight:bold; cursor:pointer;">KÍCH HOẠT NGAY</button>
        <div id="st" style="margin-top:20px; font-weight:bold; color:#2e7d32;"></div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // --- DÁN FIREBASE CONFIG CỦA THÍ CHỦ VÀO ĐÂY ---
    const firebaseConfig = { apiKey: "AIza...", authDomain: "...", projectId: "..." };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    document.getElementById('btn').onclick = async () => {
        document.getElementById('st').innerText = "⌛ Đang đổ móng...";
        try {
            await setDoc(doc(db, "Settings", "info"), { brand_name: "Tên Quán Mẫu", brand_slogan: "Ẩm Thực Tỉnh Thức", main_color: "#2e7d32", vat_rate: 8, store_address: "Địa chỉ của bạn", store_phone: "0900000000", admin_email: "email-cua-ban@gmail.com", bai_gioi_thieu_chinh: "Chào mừng quý khách...", loi_gioi_thieu: "Ăn trong tỉnh thức." });
            await setDoc(doc(db, "Settings", "staff"), { emails: ["nhanvien@gmail.com"] });
            await addDoc(collection(db, "Menus"), { ten_tieng_viet: "Món Mẫu", gia_tien: 50000, gia_von: 25000, ton_kho: 100, hinh_anh: "https://via.placeholder.com/300" });
            document.getElementById('st').innerHTML = "✅ THÀNH CÔNG!<br>Thí chủ hãy xóa tệp này và vào Admin.html nghen.";
        } catch (e) { document.getElementById('st').innerText = "❌ Lỗi: " + e.message; }
    };
</script></body></html>
